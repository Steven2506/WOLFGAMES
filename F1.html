function showNextGP(){

const now = new Date().getTime();

let nextRace = null;
let nextEvent = null;

for(let gp of calendar){

let time = new Date(gp.date).getTime();

if(time > now){

if(!nextEvent){
nextEvent = gp;
}

if(gp.type === "race" && !nextRace){
nextRace = gp;
}

}

}

if(!nextRace) return;

/* Mostrar tarjeta */

let html = `<h3>${nextEvent.name}</h3>`;

nextEvent.sessions.forEach(session => {

html += `<p>${session}</p>`;

});

document.getElementById("gp-info").innerHTML = html;

/* Contador apunta al GP */

document.getElementById("next-session-name").innerText = nextRace.name;

startCountdown(new Date(nextRace.date).getTime());

}


function startCountdown(target){

setInterval(()=>{

const now = new Date().getTime();
const diff = target - now;

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";

},1000);

}

showNextGP();

<canvas id="particles"></canvas>
<script src="particles.js"></script>
<!-- =========================
     PARTICULAS
========================= -->

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speedX:(Math.random()-0.5)*0.5,
speedY:(Math.random()-0.5)*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#a200ff";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.x+=p.speedX;
p.y+=p.speedY;

if(p.x<0||p.x>canvas.width)p.speedX*=-1;
if(p.y<0||p.y>canvas.height)p.speedY*=-1;

});

for(let a=0;a<particles.length;a++){
for(let b=a;b<particles.length;b++){

let dx=particles[a].x-particles[b].x;
let dy=particles[a].y-particles[b].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.strokeStyle="rgba(162,0,255,0.2)";
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(particles[a].x,particles[a].y);
ctx.lineTo(particles[b].x,particles[b].y);
ctx.stroke();
}

}

}

requestAnimationFrame(animate);

}

animate();

</script>
