<section class="horarios">

<h2>🏍️ GP Qatar - Horarios</h2>

<ul>
<li>FP1 — 15:45</li>
<li>PRÁCTICA — 20:00</li>
<li>CLASIFICACIÓN — 16:50</li>
<li>SPRINT — 20:00</li>
<li>CARRERA — 19:00</li>
</ul>

</section>


<div class="countdown">

<h3>Próxima sesión</h3>

<p id="session-name"></p>

<div id="countdown"></div>

</div>


<!-- SEMÁFORO -->

<div class="start-lights">
<div class="light" id="light1"></div>
<div class="light" id="light2"></div>
<div class="light" id="light3"></div>
<div class="light" id="light4"></div>
<div class="light" id="light5"></div>
</div>

<div id="go-text"></div>


<script>

/* ===== CALENDARIO MOTOGP ===== */

const gps = [

{
name:"GP Qatar 🇶🇦",
sessions:[
{ name:"FP1", date:"2026-03-27T15:45:00"},
{ name:"PRÁCTICA", date:"2026-03-27T20:00:00"},
{ name:"CLASIFICACIÓN", date:"2026-03-28T16:50:00"},
{ name:"SPRINT", date:"2026-03-28T20:00:00"},
{ name:"CARRERA", date:"2026-03-29T19:00:00"}
]
},

{
name:"GP Americas 🇺🇸",
sessions:[
{ name:"FP1", date:"2026-04-10T17:45:00"},
{ name:"PRÁCTICA", date:"2026-04-10T22:00:00"},
{ name:"CLASIFICACIÓN", date:"2026-04-11T17:50:00"},
{ name:"SPRINT", date:"2026-04-11T22:00:00"},
{ name:"CARRERA", date:"2026-04-12T21:00:00"}
]
}

];


/* ===== DETECTAR SIGUIENTE SESIÓN ===== */

function getNextSession(){

const now = new Date().getTime();

for(let g=0; g<gps.length; g++){

let sessions = gps[g].sessions;

for(let i=0;i<sessions.length;i++){

const time = new Date(sessions[i].date).getTime();

if(time > now){

return {
gp:gps[g].name,
session:sessions[i]
};

}

}

}

return null;

}


/* ===== SEMÁFORO ===== */

let lightsStarted = false;

function startLights(){

if(lightsStarted) return;

lightsStarted = true;

let lights = [
document.getElementById("light1"),
document.getElementById("light2"),
document.getElementById("light3"),
document.getElementById("light4"),
document.getElementById("light5")
];

let i = 0;

let interval = setInterval(()=>{

if(i < lights.length){

lights[i].classList.add("active");
i++;

}else{

clearInterval(interval);

setTimeout(()=>{

lights.forEach(light => light.classList.remove("active"));

document.getElementById("go-text").innerHTML="GO GO GO";

},1000);

}

},800);

}


/* ===== CONTADOR ===== */

function updateCountdown(){

const result = getNextSession();

if(!result){

document.getElementById("countdown").innerHTML="Temporada finalizada";
return;

}

document.getElementById("session-name").innerHTML =
result.gp + " — " + result.session.name;

const now = new Date().getTime();
const distance = new Date(result.session.date).getTime()-now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s";


if(distance <= 10000){
startLights();
}

}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

</body>
